# Fly.io 部署配置
app = "couple-finance-api"
primary_region = "sin"  # 新加坡节点，离中国近

[build]
  dockerfile = "./backend/Dockerfile"

[env]
  PORT = "8080"
  SPRING_PROFILES_ACTIVE = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"  # 免费配置：1核256MB
  memory = "256mb"
