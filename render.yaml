# Render 部署配置
# 免费额度：Web Service + PostgreSQL

services:
  # 后端服务
  - type: web
    name: couple-finance-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: couple-finance-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: couple-finance-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: couple-finance-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SERVER_PORT
        value: 8080
    healthCheckPath: /api/health

  # 前端服务（使用Node.js托管）
  - type: web
    name: couple-finance-web
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_URL
        fromService:
          name: couple-finance-api
          type: web
          property: host

databases:
  # PostgreSQL 数据库（免费）
  - name: couple-finance-db
    databaseName: couple_finance
    user: couple_finance
    plan: free
