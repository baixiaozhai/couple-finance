# Render 部署配置（免费额度）

services:
  # 后端服务
  - type: web
    name: couple-finance-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health

  # 前端服务
  - type: web
    name: couple-finance-web
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && VITE_API_URL=https://couple-finance-api-mfys.onrender.com/api npm run build
    startCommand: cd frontend && npx serve -s dist -l 3000
