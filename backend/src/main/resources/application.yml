server:
  port: 8080

spring:
  application:
    name: couple-finance
  
  datasource:
    url: jdbc:mysql://localhost:3306/couple_finance?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate  # 使用validate，因为我们手动创建表
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

# JWT配置
jwt:
  secret: your-256-bit-secret-key-for-couple-finance-app-2024
  expiration: 86400000  # 24小时，单位毫秒

# 日志配置
logging:
  level:
    com.couplefinance: DEBUG
    org.springframework.security: DEBUG
